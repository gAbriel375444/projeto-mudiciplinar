<link rel = "stylesheet" href = "style.css">

<body>
    <main>
        <nav> 
            <div class = "box">
                <h1>HOBOT</h1>

                <p>Bem vindo ao nosso site!</p>

            </div>

            <!--menu-->
            <div class="box2">

                <p>Tags de linha: <br><em>em:</em> ao colocar um texto entre essa tag,

            </div>


            <!--uma div pra controlar o quadrado branco e a caixa texto

                            mensagem"-->

                    </div>

                </div>

            </div>
